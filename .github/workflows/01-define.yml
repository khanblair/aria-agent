name: "📋 01-Define"

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Verbose logging'
        type: boolean
        default: false

jobs:
  define:
    name: Define & Research
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agent deps
        run: cd agent && npm install

      - name: Bootstrap state
        run: |
          mkdir -p agent/memory
          if [ ! -f agent/memory/state.json ]; then
            cat > agent/memory/state.json << 'EOF'
          {
            "current_phase": "DEFINE",
            "current_project": "blairs-academy",
            "current_language": "python",
            "week": 1,
            "learning_progress": {
              "python": { "learned": 0, "total": 50, "status": "not_started" },
              "javascript": { "learned": 0, "total": 40, "status": "pending" },
              "go": { "learned": 0, "total": 30, "status": "pending" },
              "rust": { "learned": 0, "total": 30, "status": "pending" },
              "typescript": { "learned": 0, "total": 30, "status": "pending" }
            },
            "preview_url": null,
            "production_url": null,
            "status": "READY"
          }
          EOF
          fi

      - name: Load memory
        run: |
          echo "Current state:"
          cat agent/memory/state.json 2>/dev/null || echo '{"current_phase": "DEFINE"}'

      - name: Run DEFINE phase
        env:
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
        run: |
          cd agent
          # Set phase to DEFINE if not already
          python3 -c "
          import json, os
          s = json.load(open('memory/state.json')) if os.path.exists('memory/state.json') else {}
          s['current_phase'] = 'DEFINE'
          s['current_project'] = 'blairs-academy'
          json.dump(s, open('memory/state.json','w'), indent=2)
          "
          node runner.js

      - name: Commit outputs
        run: |
          git config user.name "ARIA Agent"
          git config user.email "aria@autonomous.build"
          git add -A
          PHASE=$(python3 -c "import json; print(json.load(open('agent/memory/state.json')).get('current_phase',''))" 2>/dev/null)
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🤖 [DEFINE] Spec created"
            git push
            echo "✅ Committed"
          fi
