name: "🚀 03-Deploy"

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        type: choice
        required: true
        default: 'staging'
        options:
          - 'staging'
          - 'production'
  workflow_run:
    workflows: ["🏗️ 02-Build-Core"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI tools
        run: |
          npm install -g vercel@latest convex@latest

      - name: Bootstrap state
        run: |
          mkdir -p agent/memory
          if [ ! -f agent/memory/state.json ]; then
            cat > agent/memory/state.json << 'EOF'
          {
            "current_phase": "DEPLOY_PROD",
            "current_project": "blairs-academy",
            "status": "READY"
          }
          EOF
          fi

      - name: Deploy Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          cd projects/blairs-academy
          npx convex deploy --prod || echo "Convex deploy skipped"

      - name: Deploy Staging
        if: inputs.deploy_target == 'staging' || github.event_name == 'workflow_dispatch'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          cd projects/blairs-academy
          vercel deploy --yes --token=$VERCEL_TOKEN

      - name: Deploy Production
        if: inputs.deploy_target == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          cd projects/blairs-academy
          vercel deploy --prod --yes --token=$VERCEL_TOKEN

      - name: Update state
        run: |
          python3 -c "
          import json
          s = json.load(open('agent/memory/state.json'))
          s['current_phase'] = 'DEPLOY_PROD'
          s['production_url'] = 'https://blairs-academy.vercel.app'
          json.dump(s, open('agent/memory/state.json','w'), indent=2)
          "

      - name: Commit outputs
        run: |
          git config user.name "ARIA Agent"
          git config user.email "aria@autonomous.build"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🚀 [DEPLOY] Production deployed"
            git push
            echo "✅ Committed"
          fi
