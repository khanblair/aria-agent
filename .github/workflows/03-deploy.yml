name: "🚀 03-Deploy"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["🏗️ 02-Build-Core"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Commit & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap state
        run: |
          mkdir -p agent/memory
          if [ ! -f agent/memory/state.json ]; then
            cat > agent/memory/state.json << 'EOF'
          {
            "current_phase": "DEPLOY_PROD",
            "current_project": "blairs-academy",
            "status": "READY"
          }
          EOF
          fi

      - name: Update state
        run: |
          python3 -c "
          import json
          s = json.load(open('agent/memory/state.json'))
          s['current_phase'] = 'DEPLOY_PROD'
          s['production_url'] = 'blairs-academy.vercel.app'
          json.dump(s, open('agent/memory/state.json','w'), indent=2)
          "

      - name: Commit outputs
        run: |
          git config user.name "ARIA Agent"
          git config user.email "aria@autonomous.build"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit - Vercel will auto-deploy from main"
          else
            git commit -m "🚀 [DEPLOY] Ready for Vercel auto-deploy"
            git push
            echo "✅ Committed - Vercel will auto-build from main branch"
          fi
