name: "📚 05-Learn"

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to learn'
        type: choice
        required: false
        options:
          - 'python'
          - 'javascript'
          - 'go'
          - 'rust'
          - 'typescript'
          - 'auto'

jobs:
  learn:
    name: Learn (10-15 APIs)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agent deps
        run: cd agent && npm install

      - name: Bootstrap state
        run: |
          mkdir -p agent/memory
          if [ ! -f agent/memory/state.json ]; then
            cat > agent/memory/state.json << 'EOF'
          {
            "current_phase": "LEARN",
            "current_project": "blairs-academy",
            "current_language": "python",
            "learning_progress": {
              "python": { "learned": 0, "total": 50, "status": "not_started" },
              "javascript": { "learned": 0, "total": 40, "status": "pending" }
            },
            "status": "READY"
          }
          EOF
          fi

      - name: Show current state
        run: |
          echo "Learning progress:"
          python3 -c "import json; s=json.load(open('agent/memory/state.json')); print(json.dumps(s.get('learning_progress',{}), indent=2))"

      - name: Run LEARN phase
        env:
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
        run: |
          cd agent
          # Set to LEARN phase
          python3 -c "
          import json
          s = json.load(open('memory/state.json'))
          s['current_phase'] = 'LEARN'
          # Override language if specified
          lang = '${{ inputs.language }}'
          if lang and lang != 'auto':
            s['current_language'] = lang
          json.dump(s, open('memory/state.json','w'), indent=2)
          print(f'Learning: {s.get(\"current_language\", \"auto\")}')
          "
          node runner.js

      - name: Commit outputs
        run: |
          git config user.name "ARIA Agent"
          git config user.email "aria@autonomous.build"
          git add -A
          PHASE=$(python3 -c "import json; print(json.load(open('agent/memory/state.json')).get('current_phase',''))" 2>/dev/null)
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "📚 [LEARN] Incremental learning run"
            git push
            echo "✅ Committed"
          fi
